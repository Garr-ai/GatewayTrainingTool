name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - production

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            web/package-lock.json
      - name: Install server dependencies
        working-directory: server
        run: npm ci
      - name: Install web dependencies
        working-directory: web
        run: npm ci
      - name: Server tests
        working-directory: server
        run: npm test
      - name: Server build
        working-directory: server
        run: npm run build
      - name: Web tests
        working-directory: web
        run: npm test
      - name: Web lint
        working-directory: web
        run: npm run lint
      - name: Web build
        working-directory: web
        run: npm run build
